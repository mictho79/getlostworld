<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="gc">
      <circle cx="43" cy="43" r="25"/>
    </clipPath>
  </defs>

  <!-- Dark circular background -->
  <circle cx="50" cy="50" r="50" fill="#060d1a"/>

  <!-- Globe inner fill -->
  <circle cx="43" cy="43" r="25" fill="#0c1e3a"/>

  <!-- Globe grid lines, clipped to globe -->
  <g clip-path="url(#gc)" stroke="#5b8fff" fill="none">
    <!-- Equator -->
    <line x1="18" y1="43" x2="68" y2="43" stroke-width="2"/>
    <!-- Prime meridian -->
    <line x1="43" y1="18" x2="43" y2="68" stroke-width="2"/>
    <!-- Upper/lower parallels -->
    <line x1="18" y1="34" x2="68" y2="34" stroke-width="1.3" opacity="0.55"/>
    <line x1="18" y1="52" x2="68" y2="52" stroke-width="1.3" opacity="0.55"/>
    <!-- Curved meridian -->
    <ellipse cx="43" cy="43" rx="13" ry="25" stroke-width="1.5" opacity="0.65"/>
  </g>

  <!-- Globe outline -->
  <circle cx="43" cy="43" r="25" fill="none" stroke="#5b8fff" stroke-width="2.5"/>

  <!-- Magnifying glass lens ring -->
  <circle cx="43" cy="43" r="30" fill="rgba(91,143,255,0.07)" stroke="rgba(255,255,255,0.78)" stroke-width="4"/>

  <!-- Magnifying glass handle -->
  <line x1="66" y1="66" x2="81" y2="81" stroke="rgba(255,255,255,0.88)" stroke-width="6" stroke-linecap="round"/>
</svg>
