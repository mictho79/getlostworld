<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <clipPath id="globe-clip">
      <circle cx="600" cy="258" r="188"/>
    </clipPath>
    <radialGradient id="glow" cx="50%" cy="41%" r="50%">
      <stop offset="0%" stop-color="#1a3d78" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="globe-fill" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#122444"/>
      <stop offset="100%" stop-color="#070f22"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#060d1a"/>

  <!-- Star field -->
  <!-- Top-left zone -->
  <circle cx="48"  cy="28"  r="1.5" fill="white" opacity="0.55"/>
  <circle cx="118" cy="55"  r="1"   fill="white" opacity="0.40"/>
  <circle cx="185" cy="22"  r="2"   fill="white" opacity="0.60"/>
  <circle cx="75"  cy="98"  r="1"   fill="white" opacity="0.35"/>
  <circle cx="210" cy="78"  r="1.5" fill="white" opacity="0.50"/>
  <circle cx="32"  cy="155" r="1"   fill="white" opacity="0.45"/>
  <circle cx="155" cy="140" r="1"   fill="white" opacity="0.30"/>
  <circle cx="260" cy="50"  r="1"   fill="white" opacity="0.40"/>
  <circle cx="310" cy="30"  r="1.5" fill="white" opacity="0.55"/>
  <circle cx="95"  cy="190" r="1"   fill="white" opacity="0.35"/>
  <!-- Top-right zone -->
  <circle cx="1060" cy="35"  r="1.5" fill="white" opacity="0.55"/>
  <circle cx="1110" cy="75"  r="1"   fill="white" opacity="0.40"/>
  <circle cx="990"  cy="22"  r="2"   fill="white" opacity="0.60"/>
  <circle cx="1155" cy="115" r="1"   fill="white" opacity="0.35"/>
  <circle cx="1040" cy="105" r="1.5" fill="white" opacity="0.50"/>
  <circle cx="1175" cy="55"  r="1"   fill="white" opacity="0.45"/>
  <circle cx="920"  cy="48"  r="1"   fill="white" opacity="0.40"/>
  <circle cx="880"  cy="20"  r="1.5" fill="white" opacity="0.55"/>
  <circle cx="1140" cy="180" r="1"   fill="white" opacity="0.35"/>
  <!-- Top-middle zone (away from globe) -->
  <circle cx="370" cy="18"  r="1"   fill="white" opacity="0.45"/>
  <circle cx="455" cy="42"  r="1.5" fill="white" opacity="0.50"/>
  <circle cx="748" cy="15"  r="1"   fill="white" opacity="0.40"/>
  <circle cx="830" cy="38"  r="1.5" fill="white" opacity="0.55"/>
  <!-- Bottom-left zone -->
  <circle cx="42"  cy="580" r="1.5" fill="white" opacity="0.50"/>
  <circle cx="108" cy="530" r="1"   fill="white" opacity="0.40"/>
  <circle cx="195" cy="570" r="1"   fill="white" opacity="0.45"/>
  <circle cx="65"  cy="490" r="1"   fill="white" opacity="0.35"/>
  <circle cx="160" cy="495" r="1.5" fill="white" opacity="0.50"/>
  <circle cx="250" cy="545" r="1"   fill="white" opacity="0.40"/>
  <!-- Bottom-right zone -->
  <circle cx="1105" cy="575" r="1.5" fill="white" opacity="0.50"/>
  <circle cx="1052" cy="528" r="1"   fill="white" opacity="0.40"/>
  <circle cx="1162" cy="490" r="1"   fill="white" opacity="0.45"/>
  <circle cx="990"  cy="560" r="1"   fill="white" opacity="0.35"/>
  <circle cx="1140" cy="545" r="1.5" fill="white" opacity="0.50"/>
  <!-- Far left/right edges -->
  <circle cx="22"   cy="295" r="1"   fill="white" opacity="0.40"/>
  <circle cx="38"   cy="365" r="1.5" fill="white" opacity="0.45"/>
  <circle cx="1178" cy="280" r="1"   fill="white" opacity="0.40"/>
  <circle cx="1162" cy="370" r="1.5" fill="white" opacity="0.45"/>
  <!-- A few brighter accent stars -->
  <circle cx="138"  cy="42"  r="2.5" fill="white" opacity="0.70"/>
  <circle cx="1068" cy="52"  r="2.5" fill="white" opacity="0.70"/>
  <circle cx="58"   cy="520" r="2"   fill="white" opacity="0.60"/>
  <circle cx="1142" cy="518" r="2"   fill="white" opacity="0.60"/>

  <!-- Glow behind globe -->
  <ellipse cx="600" cy="258" rx="440" ry="340" fill="url(#glow)"/>

  <!-- Globe body -->
  <circle cx="600" cy="258" r="188" fill="url(#globe-fill)"/>

  <!-- Globe grid lines, clipped -->
  <g clip-path="url(#globe-clip)" stroke="#5b8fff" fill="none">
    <!-- Parallels -->
    <line x1="412" y1="188" x2="788" y2="188" stroke-width="1"   opacity="0.35"/>
    <line x1="412" y1="223" x2="788" y2="223" stroke-width="1.2" opacity="0.50"/>
    <line x1="412" y1="258" x2="788" y2="258" stroke-width="2"   opacity="0.90"/>
    <line x1="412" y1="293" x2="788" y2="293" stroke-width="1.2" opacity="0.50"/>
    <line x1="412" y1="328" x2="788" y2="328" stroke-width="1"   opacity="0.35"/>
    <!-- Meridians -->
    <line x1="600" y1="70"  x2="600" y2="446" stroke-width="1.5" opacity="0.50"/>
    <ellipse cx="600" cy="258" rx="55"  ry="188" stroke-width="1.4" opacity="0.55"/>
    <ellipse cx="600" cy="258" rx="115" ry="188" stroke-width="1"   opacity="0.40"/>
    <ellipse cx="600" cy="258" rx="165" ry="188" stroke-width="1"   opacity="0.30"/>
  </g>

  <!-- Globe outline -->
  <circle cx="600" cy="258" r="188" fill="none" stroke="#5b8fff" stroke-width="2.5"/>

  <!-- Magnifying glass lens ring -->
  <circle cx="600" cy="258" r="218" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="9"/>

  <!-- Magnifying glass handle -->
  <line x1="754" y1="412" x2="842" y2="500" stroke="rgba(255,255,255,0.55)" stroke-width="20" stroke-linecap="round"/>

  <!-- Site name -->
  <text
    x="600" y="538"
    font-family="Georgia, 'Playfair Display', 'Times New Roman', serif"
    font-size="82"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="3"
  >TerraLenses</text>

  <!-- Tagline -->
  <text
    x="600" y="594"
    font-family="Georgia, 'Playfair Display', 'Times New Roman', serif"
    font-size="27"
    font-style="italic"
    fill="rgba(255,255,255,0.42)"
    text-anchor="middle"
    letter-spacing="5"
  >Explore every country on Earth</text>
</svg>
