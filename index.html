<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Map Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading-overlay">
  <div class="loader-title">World Explorer</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <div class="loader-sub">Loading map data</div>
</div>

<!-- Cinematic transition overlay -->
<div id="transition-overlay"></div>

<!-- Left sidebar -->
<aside id="sidebar">
  <div id="sb-welcome">
    <div class="sb-globe">🌍</div>
    <div class="sb-welcome-divider"></div>
    <div class="sb-welcome-title">World Explorer</div>
    <div class="sb-welcome-hint">Hover a country to discover it</div>
  </div>

  <div id="sb-country">
    <span id="sb-flag"></span>
    <div id="sb-name"></div>
    <div id="sb-vibe"></div>
    <div class="sb-divider"></div>
    <div class="sb-grid">
      <div class="sb-cell">
        <span class="sb-cell-label">Capital</span>
        <span class="sb-cell-val" id="sb-capital"></span>
      </div>
      <div class="sb-cell">
        <span class="sb-cell-label">Population</span>
        <span class="sb-cell-val" id="sb-pop"></span>
      </div>
      <div class="sb-cell">
        <span class="sb-cell-label">Language</span>
        <span class="sb-cell-val" id="sb-lang"></span>
      </div>
      <div class="sb-cell">
        <span class="sb-cell-label">Sport</span>
        <span class="sb-cell-val" id="sb-sport"></span>
      </div>
    </div>
    <div class="sb-elev-strip">
      <svg class="sb-elev-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1,13 5,7 9,10 13,3 15,5"/>
      </svg>
      <span class="sb-elev-label">ELEVATION</span>
      <span id="sb-elev-val">—</span>
    </div>

    <div class="sb-fact-box">
      <span class="sb-fact-label">Did you know</span>
      <span id="sb-factval"></span>
    </div>
    <div class="sb-explore-hint">
      🖱️&nbsp; Click to explore&nbsp;<strong id="sb-explore-name"></strong>
    </div>
  </div>
</aside>

<!-- Flat map — full viewport width -->
<div id="map"></div>

<!-- Lens overlay — SVG tactical scope design -->
<svg id="lens-svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sweep-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="rgba(255,200,80,0.6)"/>
      <stop offset="100%" stop-color="rgba(255,200,80,0)"/>
    </linearGradient>
  </defs>
  <g id="lens-group"></g>
</svg>

<!-- Cursor hint text (below lens circle) -->
<div id="cursor-hint">Click to explore</div>

<!-- Language switcher pill -->
<div id="lang-switcher">
  <button class="lang-btn active" data-lang="EN"><span class="lang-flag">🇬🇧</span>EN</button>
  <button class="lang-btn" data-lang="FR"><span class="lang-flag">🇫🇷</span>FR</button>
  <button class="lang-btn" data-lang="ES"><span class="lang-flag">🇪🇸</span>ES</button>
  <button class="lang-btn" data-lang="DE"><span class="lang-flag">🇩🇪</span>DE</button>
  <button class="lang-btn" data-lang="PT"><span class="lang-flag">🇧🇷</span>PT</button>
  <button class="lang-btn" data-lang="AR"><span class="lang-flag">🇸🇦</span>AR</button>
</div>

<!-- Lens controls -->
<div id="lens-controls">
  <button id="lens-toggle" class="glass-panel active" title="Toggle satellite lens">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="7"/>
      <line x1="16.5" y1="16.5" x2="22" y2="22"/>
      <circle cx="11" cy="11" r="3" stroke-width="1.2" opacity="0.6"/>
    </svg>
  </button>
  <div id="lens-slider-panel" class="glass-panel">
    <span id="lens-slider-label">Size</span>
    <input type="range" id="lens-slider" min="80" max="280" value="220" step="2">
    <span id="lens-size-label">160</span>
  </div>
</div>

<!-- Tooltip (kept in DOM but hidden — sidebar replaces its role) -->
<div id="hover-tooltip">
  <div class="tt-header">
    <span class="tt-flag" id="tt-flag"></span>
    <span class="tt-name" id="tt-name"></span>
  </div>
  <div class="tt-divider"></div>
  <div id="tt-loading" class="tt-loading">
    <div class="tt-skeleton"></div><div class="tt-skeleton"></div>
    <div class="tt-skeleton"></div><div class="tt-skeleton"></div>
  </div>
  <div id="tt-rows" class="tt-rows" style="display:none">
    <div class="tt-row"><span class="tt-label">Capital</span><span class="tt-val" id="tt-capital"></span></div>
    <div class="tt-row"><span class="tt-label">Population</span><span class="tt-val" id="tt-pop"></span></div>
    <div class="tt-row"><span class="tt-label">Language</span><span class="tt-val" id="tt-lang"></span></div>
    <div class="tt-row"><span class="tt-label">Sport</span><span class="tt-val" id="tt-sport"></span></div>
  </div>
  <div id="tt-fact" class="tt-fact" style="display:none">
    <span class="tt-fact-label">Did you know</span>
    <span class="tt-fact-val" id="tt-factval"></span>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="topojson.min.js"></script>
<script src="config.js"></script>
<script src="map.js"></script>
<script src="sidebar.js"></script>
<script src="lang.js"></script>
<script>boot();</script>
</body>
</html>
